<input matInput type="text" matInput [formControl]="inputControl" [matAutocomplete]="auto" [class.loading]="loading()"
    [readonly]="readonly" />


<mat-autocomplete #auto="matAutocomplete" (optionSelected)="onOptionSelected($event)" [displayWith]="displayLabel">

    @for (option of filteredOptions(); track $index) {

    <mat-option [value]="option[0]">
        {{ option[1] }}
    </mat-option>

    }

    <!-- Crear nuevo -->



    @if(showCreateOption() ){
    @if(hasOptions()) {
    <mat-divider></mat-divider>
    }
    <mat-option (click)="onCreateClick()" class="create-option" [value]="inputControl.value">
        <span>➕</span><span>" {{ inputControl.value }}"</span>
    </mat-option>
    }


</mat-autocomplete>

<!-- Spinner -->
@if(loading()){
<mat-progress-spinner class="loading-spinner" diameter="20" mode="indeterminate"
    style="position:absolute; right:10px; top:50%; transform:translateY(-50%);">
</mat-progress-spinner>
}
